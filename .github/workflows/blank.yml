name: Build OpenWrt - Cudy TR3000 v1 256MB

on:
  workflow_dispatch:
    inputs:
      release:
        description: 'Upload to Release'
        required: false
        default: 'false'

  # 每周六 UTC 0 点自动编一次（北京 8 点）
  schedule:
    - cron: '0 0 * * 6'

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: main
  CONFIG_FILE: .config
  DIY_SH: diy.sh
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # ── 1. 装编译依赖 ──
    - name: Install build deps
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential clang flex bison g++ gawk \
          gettext git libncurses5-dev libssl-dev \
          python3-setuptools rsync unzip zlib1g-dev \
          file wget subversion quilt clang llvm lld

    # ── 2. Clone OpenWrt ──
    - name: Clone source
      run: |
        git clone --depth=1 -b $REPO_BRANCH $REPO_URL openwrt
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    # ── 3. 注入 .config（见下方） ──
    - name: Generate config
      working-directory: ./openwrt
      run: |
        cat <<'EOF' > .config
CONFIG_TARGET_mediatek=y
CONFIG_TARGET_mediatek_filogic=y
CONFIG_TARGET_mediatek_filogic_DEVICE_cudy_tr3000-256mb-v1=y
# === 基础 ===
CONFIG_BUSYBOX_DEFAULT_FEATURE_ETC_NETWORKS=y
CONFIG_PACKAGE_block-mount=y
CONFIG_PACKAGE_dnsmasq-full=y
CONFIG_PACKAGE_firewall4=y
CONFIG_PACKAGE_kmod-gpio-button-hotplug=y
CONFIG_PACKAGE_kmod-leds-gpio=y
CONFIG_PACKAGE_kmod-usb3=y
CONFIG_PACKAGE_kmod-usb-net=y
CONFIG_PACKAGE_kmod-usb-net-cdc-ether=y
CONFIG_PACKAGE_kmod-usb-net-rndis=y   # 旅行路由插手机/ F50 必备
CONFIG_PACKAGE_luci=y
CONFIG_PACKAGE_luci-ssl=y
CONFIG_PACKAGE_luci-theme-bootstrap=y
CONFIG_PACKAGE_wpad-openssl=y          # 别用 wolfssl，23.05 后一堆包冲突
CONFIG_PACKAGE_kmod-nft-nat=y
# === 实用小包 ===
CONFIG_PACKAGE_tcpdump-mini=y
CONFIG_PACKAGE_htop=y
CONFIG_PACKAGE_curl=y
CONFIG_PACKAGE_luci-app-sqm=y          # 2.5G WAN 建议 SQM
CONFIG_PACKAGE_luci-app-upnp=y
EOF
        make defconfig

    # ── 4. diy.sh：改默认 IP / 主机名 ──
    - name: Run DIY script
      working-directory: ./openwrt
      run: |
        cat <<'DIY' > ${{ env.DIY_SH }}
#!/bin/bash
# 默认 IP 从 192.168.1.1 → 192.168.10.1（避免跟光猫撞）
sed -i 's/192.168.1.1/192.168.10.1/g' package/base-files/files/bin/config_generate
# 主机名
sed -i 's/OpenWrt/TR3000/g' package/base-files/files/bin/config_generate
DIY
        chmod +x ${{ env.DIY_SH }}
        ./${{ env.DIY_SH }}

    # ── 5. 下载 dl ──
    - name: Download packages
      working-directory: ./openwrt
      run: make download -j$(nproc)

    # ── 6. 编译 ──
    - name: Build firmware
      working-directory: ./openwrt
      run: |
        make -j$(nproc) --output-sync=recurse \
             V=s 2>&1 | tee build.log
        # 只保留最终 bin，省 artifact 空间
        mkdir -p ../artifact
        cp -r bin/targets/mediatek/filogic/* ../artifact/

    # ── 7. 上传 Artifact ──
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: openwrt-cudy-tr3000-256mb-filogic
        path: artifact/

    # ── 8.（可选）推 Release ──
    - name: Create Release
      if: ${{ github.event.inputs.release == 'true' }}
      uses: softprops/action-gh-release@v2
      with:
        tag_name: tr3000-${{ github.run_number }}
        files: artifact/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
