name: Build OpenWrt - Cudy TR3000 v1

on:
  workflow_dispatch:
    inputs:
      device_type:
        description: '机型布局'
        required: true
        default: '256mb-stock'
        type: choice
        options:
          - '256mb-stock'
          - '256mb-ubootmod'
      optional_packages:
        description: '额外包（空格分隔，如 luci-app-sqm luci-app-upnp htop）'
        required: false
        default: ''
        type: string
      release:
        description: '发布到 Release'
        required: false
        default: true
        type: boolean

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: v25.12.5
  TZ: Asia/Shanghai
  CCACHE_DIR: /tmp/ccache

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          build-essential clang flex bison g++ gawk \
          gettext git libncurses5-dev libssl-dev \
          python3-setuptools rsync unzip zlib1g-dev \
          file wget subversion quilt ccache

    - name: Restore ccache
      uses: actions/cache@v4
      with:
        path: ${{ env.CCACHE_DIR }}
        key: ccache-cudy-tr3000-${{ hashFiles('config/*.seed', 'diy.sh') }}
        restore-keys: |
          ccache-cudy-tr3000-

    - name: Clone OpenWrt source
      run: |
        git clone --depth=1 -b $REPO_BRANCH $REPO_URL openwrt

    - name: Update and install feeds
      working-directory: ./openwrt
      run: |
        ./scripts/feeds update -a

    - name: Determine device type
      id: device
      run: |
        echo "DEVICE_TYPE=${{ github.event.inputs.device_type }}" >> "$GITHUB_OUTPUT"

    - name: Configure build
      working-directory: ./openwrt
      run: |
        set -euo pipefail
        # 基础配置
        cp ../config/common.seed .config

        # 设备特定配置
        case "${{ steps.device.outputs.DEVICE_TYPE }}" in
          "256mb-stock")
            cat ../config/cudy-tr3000-256mb.seed >> .config
            ;;
          "256mb-ubootmod")
            cat ../config/cudy-tr3000-256mb-ubootmod.seed >> .config
            ;;
        esac

        # 可选包（仅手动触发）
        IFS=' ' read -ra PKGS <<< "${{ github.event.inputs.optional_packages }}"
        for pkg in "${PKGS[@]}"; do
          [[ -n "$pkg" ]] && echo "CONFIG_PACKAGE_${pkg}=y" >> .config
        done

        make defconfig

    - name: Run custom DIY script
      working-directory: ./openwrt
      run: |
        chmod +x ../diy.sh
        ../diy.sh

    - name: Cache downloaded packages
      uses: actions/cache@v4
      with:
        path: openwrt/dl
        key: dl-cudy-tr3000-${{ hashFiles('openwrt/dl/**') }}
        restore-keys: |
          dl-cudy-tr3000-

    - name: Download package sources
      working-directory: ./openwrt
      run: make download -j$(nproc) BUILD_LOG=1

    - name: Build firmware
      working-directory: ./openwrt
      run: |
        export PATH="/usr/lib/ccache:$PATH"
        make -j$(nproc) V=s 2>&1 | tee build.log
        mkdir -p ../artifact
        cp -r bin/targets/mediatek/filogic/* ../artifact/

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: openwrt-cudy-tr3000-${{ steps.device.outputs.DEVICE_TYPE }}
        path: artifact/

    - name: Create GitHub Release
      if: ${{ github.event.inputs.release == 'true' }}
      uses: softprops/action-gh-release@v2
      with:
        tag_name: tr3000-${{ github.run_number }}-${{ steps.device.outputs.DEVICE_TYPE }}
        files: artifact/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
